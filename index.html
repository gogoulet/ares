<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ARES OPSEC — Strategic Advisory</title>

<style>

/* GLOBAL */
body {
    margin:0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background:#f7f7f5;
    color:#111;
    scroll-behavior:smooth;
}

/* HEADER */
header {
    position:fixed;
    width:100%;
    background:rgba(255,255,255,0.9);
    backdrop-filter: blur(10px);
    z-index:1000;
}

nav {
    display:flex;
    justify-content:space-between;
    padding:20px 60px;
}

.logo img { height:40px; }

.toggle {
    border:1px solid #111;
    padding:6px 12px;
    cursor:pointer;
}

/* HERO */
.hero {
    height:100vh;
    display:flex;
    align-items:center;
    padding:0 60px;
    background:url('assets/hero.jpg') center/cover;
    color:#fff;
}

.hero-overlay {
    background:rgba(0,0,0,0.4);
    padding:60px;
}

.hero h1 {
    font-size:4rem;
    max-width:800px;
}

.hero p {
    font-size:1.3rem;
}

/* SECTIONS */
section {
    padding:140px 40px;
}

.centered {
    max-width:900px;
    margin:auto;
    text-align:center;
}

h2 {
    font-size:3rem;
    margin-bottom:20px;
}

.section-intro {
    margin:0 auto 60px;
    max-width:700px;
    opacity:0.75;
}

/* GRID */
.grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:50px;
    max-width:1200px;
    margin:auto;
}

/* CARDS */
.card {
    padding:30px;
    transition:all 0.35s ease;
    border-radius:8px;
}

.card:hover {
    transform:translateY(-10px);
    background:#fff;
    box-shadow:0 15px 40px rgba(0,0,0,0.08);
}

.card h3 {
    position:relative;
}

.card h3::after {
    content:"";
    display:block;
    width:0;
    height:2px;
    background:#c9a96e;
    transition:0.3s;
    margin-top:6px;
}

.card:hover h3::after {
    width:40px;
}

/* CTA */
.cta-section {
    background:linear-gradient(120deg,#111,#222);
    color:#fff;
}

/* BUTTON */
.btn {
    display:inline-block;
    margin-top:25px;
    padding:14px 28px;
    border:1px solid #fff;
    color:#fff;
    text-decoration:none;
    transition:0.3s;
}

.btn:hover {
    background:#fff;
    color:#000;
    transform:scale(1.05);
}

.light-btn {
    border-color:#111;
    color:#111;
}

/* FORM */
form {
    max-width:600px;
    margin:40px auto;
}

input, select, textarea {
    width:100%;
    padding:14px;
    margin-bottom:14px;
    border:1px solid #ddd;
}

/* FOOTER */
.footer {
    background:#111;
    color:#bbb;
    padding:60px 40px;
    text-align:center;
}

.footer small {
    display:block;
    margin-top:10px;
    opacity:0.6;
}

</style>
</head>

<body>

<header>
<nav>
<div class="logo"><img src="logo.png"></div>
<div class="toggle" onclick="toggleLang()">FR / EN</div>
</nav>
</header>

<!-- HERO -->
<section class="hero">
<div class="hero-overlay">

<h1 data-fr="Clarté stratégique pour des environnements complexes"
     data-en="Strategic clarity for complex environments"></h1>

<p data-fr="Nous accompagnons les dirigeants, les familles et les organisations dans la gestion du risque, de la perception et de l’influence."
   data-en="We advise leaders, families and organizations on risk, perception and influence."></p>

<a href="#contact" class="btn"
   data-fr="Demande confidentielle"
   data-en="Request Consultation"></a>

</div>
</section>

<!-- STORY -->
<section>
<div class="centered">
<p class="section-intro"
data-fr="Certains environnements ne tolèrent pas l’improvisation. Lorsque les enjeux deviennent complexes, les décisions doivent être structurées, rapides et éclairées."
data-en="Some environments do not tolerate improvisation. When stakes become complex, decisions must be structured and informed.">
</p>
</div>
</section>

<!-- SERVICES -->
<section>

<div class="centered">
<h2 data-fr="Conseil stratégique"
    data-en="Strategic Advisory"></h2>
</div>

<div class="grid">

<div class="card">
<h3>Risk & Intelligence</h3>
<p data-fr="Identification des vulnérabilités et analyse stratégique."
   data-en="Identifying vulnerabilities and strategic risks."></p>
</div>

<div class="card">
<h3>Protection Strategy</h3>
<p data-fr="Cadres adaptés pour individus et organisations."
   data-en="Tailored protection frameworks."></p>
</div>

<div class="card">
<h3>Crisis Management</h3>
<p data-fr="Maintien du contrôle sous pression."
   data-en="Maintaining control under pressure."></p>
</div>

<div class="card">
<h3>Influence</h3>
<p data-fr="Gestion de la perception et des dynamiques publiques."
   data-en="Managing perception and stakeholder dynamics."></p>
</div>

</div>

</section>

<!-- CTA -->
<section class="cta-section">
<div class="centered">

<h2 data-fr="Ce n’est pas une question de sécurité"
    data-en="This is not about security"></h2>

<p class="section-intro"
data-fr="C’est une question de contrôle dans un environnement instable."
data-en="This is about control in unstable environments."></p>

<a href="#contact" class="btn">Speak with an advisor</a>

</div>
</section>

<!-- FORM -->
<section id="contact">

<div class="centered">

<h2 data-fr="Accès confidentiel"
    data-en="Confidential Access"></h2>

</div>

<form>

<input placeholder="Name">
<input placeholder="Email">

<select>
<option>Type of engagement</option>
<option>Strategic Advisory</option>
<option>Protection</option>
<option>Crisis</option>
</select>

<select>
<option>Budget</option>
<option>$10k-$25k</option>
<option>$25k-$50k</option>
<option>$50k+</option>
</select>

<select>
<option>Urgency</option>
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select>

<textarea placeholder="Message"></textarea>

<button class="btn light-btn">Submit</button>

</form>

</section>

<!-- FINAL CTA -->
<section class="cta-section">
<div class="centered">

<h2 data-fr="Les bons mandats commencent par une conversation"
    data-en="The right engagements start with a conversation"></h2>

<a href="#contact" class="btn">Request Access</a>

</div>
</section>

<footer class="footer">

<strong>ARES OPSEC</strong><br>
Strategic Security, Risk & Influence Advisory

<small>© 2026 ARES OPSEC. All rights reserved.</small>
<small>ARES OPSEC™ — Proprietary frameworks & methodologies.</small>

</footer>

<script>

function toggleLang(){
    document.querySelectorAll("[data-fr]").forEach(el=>{
        el.innerHTML = (el.innerHTML === el.dataset.fr) ? el.dataset.en : el.dataset.fr;
    });
}

toggleLang();

</script>

</body>
</html>
