<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ARES OPSEC — Strategic Security & Risk Intelligence</title>

<style>

/* GLOBAL */
body {
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background:#05070d;
    color:#fff;
    cursor:none;
}

/* CUSTOM CURSOR */
.cursor {
    width:12px;
    height:12px;
    border:1px solid #c9a96e;
    border-radius:50%;
    position:fixed;
    pointer-events:none;
    z-index:9999;
    transition:transform 0.1s ease;
}

/* HEADER */
header {
    position:fixed;
    width:100%;
    background:rgba(5,7,13,0.7);
    backdrop-filter: blur(12px);
    z-index:1000;
}

nav {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 40px;
}

.logo img { height:40px; }

.toggle {
    border:1px solid #c9a96e;
    padding:6px 14px;
    font-size:12px;
    cursor:pointer;
}

/* HERO */
.hero {
    height:100vh;
    display:flex;
    align-items:center;
    background:linear-gradient(rgba(0,0,0,0.6), #05070d),
               url('assets/hero.jpg') center/cover fixed;
}

.hero h1 {
    font-size:4rem;
    font-weight:700;
    letter-spacing:1px;
    line-height:1.1;
    text-shadow:0 0 20px rgba(0,0,0,0.7);
}

.hero p {
    font-size:1.3rem;
    max-width:600px;
    opacity:0.85;
}

/* STRONG HEADERS */
h2 {
    font-size:3rem;
    font-weight:700;
    margin-bottom:30px;
    position:relative;
}

h2::after {
    content:"";
    display:block;
    width:60px;
    height:2px;
    background:#c9a96e;
    margin-top:10px;
}

/* BUTTON */
.btn {
    display:inline-block;
    margin-top:25px;
    padding:14px 30px;
    border:1px solid #c9a96e;
    color:#c9a96e;
    text-decoration:none;
    transition:0.3s;
}

.btn:hover {
    background:#c9a96e;
    color:#000;
}

/* SECTIONS */
section {
    padding:140px 40px;
}

/* PARALLAX */
.parallax {
    height:60vh;
    background-size:cover;
    background-position:center;
    background-attachment:fixed;
}

/* GRID */
.grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:30px;
}

.card {
    padding:35px;
    border:1px solid rgba(255,255,255,0.08);
    transition:0.4s;
    background:rgba(255,255,255,0.02);
}

.card:hover {
    transform:translateY(-10px) scale(1.02);
    border-color:#c9a96e;
}

/* FADE */
.fade {
    opacity:0;
    transform:translateY(80px);
    transition:1.2s ease;
}

.fade.visible {
    opacity:1;
    transform:translateY(0);
}

/* FORM */
input, textarea {
    width:100%;
    padding:14px;
    margin-bottom:12px;
    background:#0d111a;
    border:1px solid rgba(255,255,255,0.1);
    color:#fff;
}

/* FOOTER */
footer {
    text-align:center;
    padding:60px;
    color:#666;
}

</style>
</head>

<body>

<div class="cursor"></div>

<header>
<nav>
<div class="logo"><img src="logo.png"></div>
<div class="toggle" onclick="toggleLang()">FR / EN</div>
</nav>
</header>

<section class="hero">
<div class="fade">
<h1 data-fr="Nous protégeons ce qui ne peut pas être remplacé."
     data-en="We protect what cannot be replaced."></h1>

<p data-fr="ARES OPSEC agit là où le risque devient stratégique."
   data-en="ARES OPSEC operates where risk becomes strategic."></p>

<a class="btn"
   data-fr="Accès confidentiel"
   data-en="Confidential Access"></a>
</div>
</section>

<div class="parallax" style="background-image:url('assets/convoy.jpg')"></div>

<section>
<div class="fade">
<h2 data-fr="La réalité"
    data-en="The Reality"></h2>

<p data-fr="Le monde est instable. L’influence attire l’attention. L’attention crée du risque."
   data-en="The world is unstable. Influence attracts attention. Attention creates risk."></p>
</div>
</section>

<div class="parallax" style="background-image:url('assets/intel.jpg')"></div>

<section>
<div class="fade">
<h2 data-fr="Capacités stratégiques"
    data-en="Strategic Capabilities"></h2>

<div class="grid">

<div class="card">Intelligence & Risk</div>
<div class="card">Protective Operations</div>
<div class="card">Crisis Response</div>
<div class="card">Global Support</div>

</div>
</div>
</section>

<div class="parallax" style="background-image:url('assets/home.jpg')"></div>

<section>
<div class="fade">
<h2 data-fr="Portée globale"
    data-en="Global Reach"></h2>

<p>
Canada • United Kingdom • Commonwealth • International Operations
</p>
</div>
</section>

<section>
<div class="fade">
<h2 data-fr="Accès confidentiel"
    data-en="Confidential Access"></h2>

<form>
<input placeholder="Name">
<input placeholder="Email">
<textarea placeholder="Message"></textarea>
<button class="btn">Submit</button>
</form>

</div>
</section>

<footer>
ARES OPSEC — Strategic Security & Risk Intelligence
</footer>

<script>

/* LANGUAGE */
function toggleLang(){
    document.querySelectorAll("[data-fr]").forEach(el=>{
        el.innerHTML = (el.innerHTML === el.dataset.fr) ? el.dataset.en : el.dataset.fr;
    });
}
toggleLang();

/* SCROLL */
const faders = document.querySelectorAll('.fade');
window.addEventListener('scroll',()=>{
    faders.forEach(el=>{
        if(el.getBoundingClientRect().top < window.innerHeight - 80){
            el.classList.add('visible');
        }
    });
});

/* CURSOR */
const cursor = document.querySelector('.cursor');
document.addEventListener('mousemove', e=>{
    cursor.style.top = e.clientY + 'px';
    cursor.style.left = e.clientX + 'px';
});

</script>

</body>
</html>
