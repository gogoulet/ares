    text-align:center;
    max-width:900px;
    margin:auto;
}

h2 {
    font-size:2.4rem;
    margin-bottom:20px;
    letter-spacing:-0.5px;
}

h3 {
    font-size:1.4rem;
    margin-bottom:12px;
}

/* GRID */
.grid {
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:40px;
    max-width:1000px;
    margin:40px auto;
}

.three-grid {
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:30px;
    max-width:1100px;
    margin:50px auto 20px auto;
}

/* CARDS */
.card {
    display:block;
    padding:35px;
    background:#fff;
    border:1px solid #eee;
    transition:0.3s;
}

.card:hover {
    transform:translateY(-6px);
    box-shadow:0 15px 30px rgba(0,0,0,0.05);
}

.client-card {
    padding:40px 30px;
    background:#111;
    color:#fff;
    border:1px solid #222;
}

.client-card h3 {
    color:#fff;
    border-bottom:1px solid #333;
    padding-bottom:15px;
}

.client-card p {
    font-size:0.95rem;
    color:#aaa;
}

/* BUTTON */
.btn {
    display:inline-block;
    margin-top:25px;
    padding:14px 28px;
    border:1px solid #fff;
    color:#fff;
    cursor:pointer;
    font-size:0.9rem;
    letter-spacing:1px;
    text-transform:uppercase;
    transition:0.3s;
}

.btn:hover {
    background:#fff;
    color:#000;
}

.light-btn {
    border-color:#111;
    color:#111;
}

.light-btn:hover {
    background:#111;
    color:#fff;
}

/* CTA */
.cta-section {

    color:#fff;
    text-align:center;
    padding:120px 20px;
}

/* FORM */
form {

    margin:40px auto;
    display:flex;
    flex-direction:column;
    gap:15px;
}

input, select, textarea {

/* FOOTER */

}

footer a {

footer a:hover {
