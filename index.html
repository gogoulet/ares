<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ARES OPSEC — Strategic Advisory</title>

<style>

/* GLOBAL */
body {
    margin:0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background:#f7f7f5;
    color:#111;
}

/* HEADER */
header {
    position:fixed;
    width:100%;
    background:rgba(255,255,255,0.9);
    backdrop-filter: blur(10px);
    z-index:1000;
}

nav {
    display:flex;
    justify-content:space-between;
    padding:20px 60px;
}

.logo img { height:40px; }

.toggle {
    border:1px solid #111;
    padding:6px 12px;
    cursor:pointer;
}

/* HERO */
.hero {
    height:100vh;
    display:flex;
    align-items:center;
    padding:0 60px;
    background:url('assets/hero.jpg') center/cover;
    color:#fff;
}

.hero-overlay {
    background:rgba(0,0,0,0.4);
    padding:60px;
}

.hero h1 {
    font-size:4rem;
    max-width:800px;
}

.hero p {
    font-size:1.3rem;
    max-width:600px;
}

/* SECTIONS */
section {
    padding:140px 60px;
}

.alt {
    background:#111;
    color:#fff;
}

h2 {
    font-size:3rem;
    margin-bottom:20px;
}

.section-intro {
    max-width:700px;
    margin-bottom:60px;
    opacity:0.8;
}

/* GRID */
.grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:50px;
}

/* CARDS */
.card {
    padding:20px 0;
    transition:0.3s;
    border-bottom:1px solid transparent;
}

.card:hover {
    transform:translateY(-6px);
    border-bottom:1px solid #c9a96e;
}

.card h3 {
    font-size:1.6rem;
}

.card p {
    opacity:0.7;
}

/* CTA */
.cta-section {
    background:linear-gradient(120deg,#111,#222);
    color:#fff;
    text-align:center;
}

.btn {
    display:inline-block;
    margin-top:30px;
    padding:14px 28px;
    border:1px solid #fff;
    color:#fff;
    text-decoration:none;
}

.light-btn {
    border-color:#111;
    color:#111;
}

/* FORM */
form {
    max-width:600px;
}

input, textarea {
    width:100%;
    padding:14px;
    margin-bottom:12px;
    border:1px solid #ddd;
    background:#fff;
}

/* FOOTER */
footer {
    padding:60px;
    text-align:center;
    font-size:0.9rem;
}

</style>
</head>

<body>

<header>
<nav>
<div class="logo"><img src="logo.png"></div>
<div class="toggle" onclick="toggleLang()">FR / EN</div>
</nav>
</header>

<!-- HERO -->
<section class="hero">
<div class="hero-overlay">

<h1 data-fr="Clarté stratégique pour des environnements complexes"
     data-en="Strategic clarity for complex environments"></h1>

<p data-fr="Nous accompagnons les dirigeants, les familles et les organisations dans la gestion du risque, de la perception et de l’influence."
   data-en="We advise leaders, families and organizations on risk, perception and influence."></p>

<a class="btn"
   data-fr="Demande confidentielle"
   data-en="Request Consultation"></a>

</div>
</section>

<!-- ADVISORY -->
<section>
<h2 data-fr="Conseil stratégique"
    data-en="Strategic Advisory"></h2>

<p class="section-intro"
   data-fr="Une approche structurée pour naviguer les environnements où le risque, l’influence et la perception se croisent."
   data-en="A structured approach to navigating environments where risk, influence and perception intersect."></p>

<div class="grid">

<div class="card">
<h3 data-fr="Risque & Intelligence"
    data-en="Risk & Intelligence"></h3>
<p data-fr="Compréhension des environnements complexes et identification des vulnérabilités."
   data-en="Understanding complex environments and identifying exposure points."></p>
</div>

<div class="card">
<h3 data-fr="Stratégie de protection"
    data-en="Protection Strategy"></h3>
<p data-fr="Création de cadres de protection adaptés aux individus et organisations."
   data-en="Designing tailored frameworks for individuals and organizations."></p>
</div>

<div class="card">
<h3 data-fr="Gestion de crise"
    data-en="Crisis Management"></h3>
<p data-fr="Maintenir clarté et contrôle sous pression."
   data-en="Maintaining clarity and control under pressure."></p>
</div>

<div class="card">
<h3 data-fr="Influence & perception"
    data-en="Influence & Perception"></h3>
<p data-fr="Alignement stratégique avec les dynamiques publiques et politiques."
   data-en="Aligning strategy with stakeholder and public dynamics."></p>
</div>

</div>
</section>

<!-- CTA CONTEXT -->
<section class="cta-section">

<h2 data-fr="Les environnements changent rapidement"
    data-en="Environments evolve rapidly"></h2>

<p class="section-intro"
   data-fr="Les risques modernes sont interconnectés. La perception devient stratégique. La préparation fait la différence."
   data-en="Modern risks are interconnected. Perception is strategic. Preparation makes the difference."></p>

<a class="btn"
   data-fr="Parler à un conseiller"
   data-en="Speak with an advisor"></a>

</section>

<!-- WHO -->
<section>
<h2 data-fr="Nous accompagnons"
    data-en="Who We Work With"></h2>

<div class="grid">

<div class="card">
<h3>Executives</h3>
<p data-fr="Dirigeants exposés à des environnements complexes."
   data-en="Leaders operating in complex environments."></p>
</div>

<div class="card">
<h3>Families</h3>
<p data-fr="Familles recherchant stabilité et protection."
   data-en="Families seeking stability and protection."></p>
</div>

<div class="card">
<h3>Organizations</h3>
<p data-fr="Projets exposés à des pressions externes."
   data-en="Projects exposed to external pressure."></p>
</div>

</div>
</section>

<!-- CONTACT -->
<section>

<h2 data-fr="Accès confidentiel"
    data-en="Confidential Access"></h2>

<p class="section-intro"
   data-fr="Chaque mandat est évalué selon sa portée stratégique."
   data-en="Each engagement is evaluated based on strategic relevance."></p>

<form>
<input placeholder="Name">
<input placeholder="Email">
<textarea placeholder="Message"></textarea>
<button class="btn light-btn">Submit</button>
</form>

</section>

<!-- FINAL CTA -->
<section class="cta-section">

<h2 data-fr="Discrétion. Clarté. Contrôle."
    data-en="Discretion. Clarity. Control."></h2>

<a class="btn"
   data-fr="Faire une demande"
   data-en="Request Access"></a>

</section>

<footer>
ARES OPSEC
</footer>

<script>

function toggleLang(){
    document.querySelectorAll("[data-fr]").forEach(el=>{
        el.innerHTML = (el.innerHTML === el.dataset.fr) ? el.dataset.en : el.dataset.fr;
    });
}

toggleLang();

</script>

</body>
</html>
