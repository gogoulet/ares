<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<base href="./">

<title>ARES OPSEC — Strategic Advisory</title>

<style>

/* GLOBAL */
body {
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    background:#f7f7f5;
    color:#111;
    scroll-behavior:smooth;
}

/* HEADER */
header {
    position:fixed;
    width:100%;
    background:rgba(255,255,255,0.9);
    backdrop-filter:blur(10px);
    z-index:1000;
}

nav {
    display:flex;
    justify-content:space-between;
    padding:20px 40px;
}

.logo img {height:40px;}

.menu a {
    margin-left:20px;
    text-decoration:none;
    color:#111;
    font-size:0.95rem;
}

.menu a:hover {opacity:0.6;}

.toggle {
    border:1px solid #111;
    padding:6px 12px;
    cursor:pointer;
}

/* HERO */
.hero {
    height:100vh;
    display:flex;
    align-items:center;
    padding:0 40px;
    background:url('assets/hero.jpg') center/cover;
    color:#fff;
}

.hero-overlay {
    background:rgba(0,0,0,0.45);
    padding:50px;
}

.hero h1 {
    font-size:3.5rem;
    line-height:1.1;
}

.hero p {
    font-size:1.2rem;
    opacity:0.9;
}

/* STORY */
.story {
    padding:100px 20px;
    text-align:center;
    max-width:800px;
    margin:auto;
    font-size:1.3rem;
}

/* SECTIONS */
section {
    padding:120px 20px;
}

.centered {
    text-align:center;
    max-width:900px;
    margin:auto;
}

h2 {
    font-size:2.6rem;
    margin-bottom:20px;
}

.section-intro {
    max-width:650px;
    margin:0 auto 50px;
    opacity:0.75;
}

/* GRID */
.grid {
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:40px;
    max-width:900px;
    margin:auto;
}

/* CARDS */
.card {
    padding:25px;
    transition:0.3s;
    position:relative;
}

.card::after {
    content:"";
    position:absolute;
    bottom:0;
    left:0;
    height:2px;
    width:0;
    background:#c9a96e;
    transition:0.3s;
}

.card:hover::after {width:100%;}

.card:hover {
    transform:translateY(-6px);
}

.card h3 {
    font-size:1.4rem;
}

/* CTA */
.cta-section {
    background:linear-gradient(120deg,#111,#222);
    color:#fff;
    text-align:center;
}

.btn {
    display:inline-block;
    margin-top:25px;
    padding:14px 28px;
    border:1px solid #fff;
    color:#fff;
    text-decoration:none;
    transition:0.3s;
}

.btn:hover {
    background:#fff;
    color:#000;
}

/* FOOTER */
footer {
    background:#111;
    color:#bbb;
    text-align:center;
    padding:60px 20px;
}

footer small {
    display:block;
    margin-top:8px;
    opacity:0.6;
}

/* MOBILE */
@media(max-width:768px){

.hero h1 {font-size:2.2rem;}

.grid {grid-template-columns:1fr;}

}

</style>
</head>

<script>
