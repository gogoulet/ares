<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ARES OPSEC — Strategic Advisory</title>

<style>

/* GLOBAL */
body {
    margin:0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background:#f7f7f5;
    color:#111;
}

/* HEADER */
header {
    position:fixed;
    width:100%;
    background:rgba(255,255,255,0.9);
    backdrop-filter: blur(10px);
    z-index:1000;
}

nav {
    display:flex;
    justify-content:space-between;
    padding:20px 40px;
}

.logo img { height:40px; }

.toggle {
    border:1px solid #111;
    padding:6px 12px;
    cursor:pointer;
}

/* HERO */
.hero {
    height:100vh;
    display:flex;
    align-items:center;
    padding:0 40px;
    background:url('assets/hero.jpg') center/cover;
    color:#fff;
}

.hero-overlay {
    background:rgba(0,0,0,0.4);
    padding:50px;
}

.hero h1 {
    font-size:3.5rem;
}

.hero p {
    font-size:1.2rem;
}

/* STORY FIX */
.story {
    background:#fff;
    padding:80px 20px;
}

.story p {
    max-width:700px;
    margin:auto;
    text-align:center;
    font-size:1.2rem;
}

/* SECTIONS */
section {
    padding:120px 20px;
}

.centered {
    text-align:center;
    max-width:900px;
    margin:auto;
}

h2 {
    font-size:2.8rem;
}

/* GRID FIX */
.grid {
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:40px;
    max-width:900px;
    margin:60px auto 0;
}

.card {
    padding:20px;
    transition:0.3s;
}

.card:hover {
    transform:translateY(-6px);
}

.card h3 {
    font-size:1.4rem;
}

/* CTA */
.cta-section {
    background:linear-gradient(120deg,#111,#222);
    color:#fff;
    text-align:center;
}

.btn {
    display:inline-block;
    margin-top:25px;
    padding:14px 28px;
    border:1px solid #fff;
    color:#fff;
    text-decoration:none;
}

/* FORM */
form {
    max-width:500px;
    margin:40px auto;
}

input, select, textarea {
    width:100%;
    padding:14px;
    margin-bottom:12px;
}

/* FOOTER */
.footer {
    background:#111;
    color:#bbb;
    text-align:center;
    padding:50px 20px;
}

/* MOBILE */
@media(max-width:768px){

.hero h1 {font-size:2.2rem;}

.grid {
    grid-template-columns:1fr;
}

.hero-overlay {
    padding:30px;
}

}

</style>
</head>

<body>

<header>
<nav>
<div class="logo"><img src="logo.png"></div>
<div class="toggle" onclick="toggleLang()">FR / EN</div>
</nav>
</header>

<!-- HERO -->
<section class="hero">
<div class="hero-overlay">

<h1 data-fr="Clarté stratégique pour des environnements complexes"
     data-en="Strategic clarity for complex environments"></h1>

<p data-fr="Nous accompagnons les dirigeants, les familles et les organisations dans la gestion du risque et de l’influence."
   data-en="We advise leaders, families and organizations on risk and influence."></p>

<a href="#contact" class="btn"
   data-fr="Demande confidentielle"
   data-en="Request Consultation"></a>

</div>
</section>

<!-- STORY -->
<section class="story">

<p data-fr="Certains environnements ne tolèrent pas l’improvisation. Lorsque les enjeux deviennent complexes, les décisions doivent être structurées, rapides et éclairées."
   data-en="Some environments do not tolerate improvisation. When stakes become complex, decisions must be structured and informed."></p>

</section>

<!-- SERVICES -->
<section>

<div class="centered">
<h2 data-fr="Conseil stratégique"
    data-en="Strategic Advisory"></h2>
</div>

<div class="grid">

<div class="card">
<h3>Risk & Intelligence</h3>
<p data-fr="Analyse des vulnérabilités"
   data-en="Risk analysis"></p>
</div>

<div class="card">
<h3>Protection Strategy</h3>
<p data-fr="Cadres adaptés"
   data-en="Protection frameworks"></p>
</div>

<div class="card">
<h3>Crisis Management</h3>
<p data-fr="Gestion sous pression"
   data-en="Crisis control"></p>
</div>

<div class="card">
<h3>Influence</h3>
<p data-fr="Perception publique"
   data-en="Public perception"></p>
</div>

</div>

</section>

<!-- CTA -->
<section class="cta-section">

<h2 data-fr="Ce n’est pas une question de sécurité"
    data-en="This is not about security"></h2>

<a href="#contact" class="btn"
   data-fr="Parler à un conseiller"
   data-en="Speak with an advisor"></a>

</section>

<!-- FORM -->
<section id="contact">

<div class="centered">

<h2 data-fr="Accès confidentiel"
    data-en="Confidential Access"></h2>

</div>

<form>

<input placeholder="Name">
<input placeholder="Email">

<select>
<option data-fr="Type de mandat" data-en="Type of engagement"></option>
<option>Strategic Advisory</option>
<option>Protection</option>
<option>Crisis</option>
</select>

<select>
<option data-fr="Budget estimé" data-en="Budget"></option>
<option>$10k-$25k</option>
<option>$25k-$50k</option>
<option>$50k+</option>
</select>

<select>
<option data-fr="Urgence" data-en="Urgency"></option>
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select>

<textarea placeholder="Message"></textarea>

<button class="btn"
data-fr="Envoyer"
data-en="Submit"></button>

</form>

</section>

<footer class="footer">

ARES OPSEC<br>
© 2026 — All rights reserved

</footer>

<script>

function toggleLang(){
    document.querySelectorAll("[data-fr]").forEach(el=>{
        el.innerHTML = (el.innerHTML === el.dataset.fr) ? el.dataset.en : el.dataset.fr;
    });
}

toggleLang();

</script>

</body>
</html>
