<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ARES OPSEC</title>

<base href="./">

<style>

/* RESET */
* {margin:0;padding:0;box-sizing:border-box;}

body {
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    background:#f7f7f5;
    color:#111;
}

a {
    text-decoration:none;
    color:inherit;
}

/* HEADER */
header {
    position:fixed;
    width:100%;
    background:rgba(255,255,255,0.9);
    backdrop-filter:blur(10px);
    z-index:1000;
}

nav {
    display:flex;
    justify-content:space-between;
    padding:20px 40px;
}

.menu a {
    margin-left:20px;
    font-size:0.95rem;
}

/* HERO */
.hero {
    height:100vh;
    display:flex;
    align-items:center;
    padding:0 40px;
    background:url('assets/hero.jpg') center/cover;
    color:#fff;
}

.hero-overlay {
    background:rgba(0,0,0,0.45);
    padding:50px;
}

.hero h1 {
    font-size:3rem;
}

.hero p {
    margin-top:15px;
}

/* STORY */
.story {
    padding:100px 20px;
    text-align:center;
    max-width:800px;
    margin:auto;
}

/* SECTIONS */
section {padding:100px 20px;}

.centered {
    text-align:center;
    max-width:900px;
    margin:auto;
}

h2 {
    font-size:2.4rem;
    margin-bottom:20px;
}

/* GRID */
.grid {
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:40px;
    max-width:900px;
    margin:40px auto;
}

/* CARDS */
.card {
    display:block;
    padding:25px;
    transition:0.3s;
}

.card:hover {
    transform:translateY(-6px);
}

/* BUTTON */
.btn {
    display:inline-block;
    margin-top:25px;
    padding:14px 28px;
    border:1px solid #fff;
    color:#fff;
    cursor:pointer;
}

.btn:hover {
    background:#fff;
    color:#000;
}

.light-btn {
    border-color:#111;
    color:#111;
}

.light-btn:hover {
    background:#111;
    color:#fff;
}

/* CTA */
.cta-section {
    background:linear-gradient(120deg,#111,#222);
    color:#fff;
    text-align:center;
}

/* FORM */
form {
    max-width:500px;
    margin:40px auto;
    display:flex;
    flex-direction:column;
    gap:12px;
}

input, select, textarea {
    padding:14px;
    border:1px solid #ddd;
}

/* FOOTER */
footer {
    background:#111;
    color:#bbb;
    text-align:center;
    padding:60px 20px;
}

/* MOBILE */
@media(max-width:768px){
.grid {grid-template-columns:1fr;}
.hero h1 {font-size:2rem;}
}

</style>
</head>

<body>

<header>
<nav>

</div>

FR / EN

</nav>
</header>

<script>

let currentLang = "fr";

function toggleLang() {
    currentLang = currentLang === "fr" ? "en" : "fr";

    document.querySelectorAll("[data-fr]").forEach(el => {
        el.innerHTML = el.dataset[currentLang];
    });
}

// init
toggleLang();

</script>
